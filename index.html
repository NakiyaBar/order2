<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nakiya Bar Order</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js"></script>
</head>
<body>

<div class="top" style="display: flex; gap: 15px; justify-content: space-between; align-items: center;">
  
  <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
    <h3 style="margin: 0; border: none; padding: 0; white-space: nowrap;">卓</h3>
    <select id="table" onchange="onTableSelect()" style="width: 100%; padding: 8px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc;"></select>
  </div>
  
  <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
    <h3 style="margin: 0; border: none; padding: 0; white-space: nowrap;">担当</h3>
    <select id="staff" style="width: 100%; padding: 8px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc;"></select>
  </div>

</div>
<div id="tableLabel" style="margin-top: -10px; margin-bottom: 20px; padding-left: 5px; color: white; font-size: 12px; font-weight: bold;"></div>

<div id="menuArea" class="hidden">
  <div class="mode-buttons">
    <button id="originalBtn" onclick="toggleOriginal()">オリジナルカクテル</button>
    <button id="foodBtn" onclick="toggleFood()">フード</button>
  </div>

  <div id="normalArea">
    <h3>リキュール①</h3>
    <div id="l1Area" class="grid"></div>

    <h3>リキュール②</h3>
    <div id="l2Area" class="grid"></div>

    <h3>サワー</h3>
    <div class="grid sour-area">
      <label><input type="radio" name="sour" value="あり"><div class="card white">あり</div></label>
      <label><input type="radio" name="sour" value="なし"><div class="card white">なし</div></label>
    </div>
  </div>

  <div id="originalArea" class="hidden">
    <h3>オリジナルカクテル</h3>
    <div id="originalList" class="grid"></div>
  </div>

  <div id="foodArea" class="hidden">
    <h3>フード</h3>
    <div id="foodList" class="grid"></div> 
  </div>
    
  <div class="action-buttons" style="margin-top: 20px;">
    <button id="addBtn" onclick="addToCart()" style="background:#4cafef; color:white;">カートに追加</button>
    <button id="orderCheckBtn" onclick="openCart()" disabled>注文確認</button>
  </div>
</div>

<div id="cartModal" class="modal" style="display:none;">
  <div class="modal-content">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4cafef; padding-bottom: 5px; margin-bottom: 15px;">
      <h3 style="margin: 0; border: none; padding: 0;">注文確認</h3>
      <span id="cartTable" style="font-size: 16px; font-weight: bold; color: #333; margin-right: 12px;"></span>
    </div>
    
    <div id="cartList"></div>
    
    <div class="cart-actions">
      <button id="sendBtn" onclick="sendOrder()">送信</button>
      <button id="closeBtn" onclick="closeCart()">閉じる</button>
    </div>
  </div>
</div>

</body>
</html>
